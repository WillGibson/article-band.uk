{{ define "main" }}
  <article class="pa3 pa4-ns nested-copy-line-height">
    {{ with .Content }}
    <section class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center measure-wide lh-copy nested-links {{ $.Param "text_color" | compare.Default "mid-gray" }}">
      {{- . -}}
    </section>
    {{ end }}
    <section class="flex-ns flex-wrap justify-around">
      {{ range .Paginator.Pages }}
        <div class="w-100 mb4 relative bg-white">
          {{ .Render "summary-with-image" }}
        </div>
      {{ end }}
    </section>
    {{ partial "pagination.html" . -}}
  </article>
{{ end }}
